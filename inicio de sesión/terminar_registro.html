<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Albergue</title>
    <link rel="stylesheet" href="terminar_registro.css">
</head>
<body>
    <div class="container">
        <div class="form">
            <h1 class="title">TERMINE SU REGISTRO</h1>
            <form id="registrationForm" onsubmit="return validateForm()">
                <div class="input-grid">
                    <div class="input-container">
                        <label for="year">Año de creación</label>
                        <input type="number" id="year" class="input" required min="1900" max="2099">
                    </div>
                    <div class="input-container">
                        <label for="donation-point">Punto de acopio de donaciones</label>
                        <input type="text" id="donation-point" class="input" required>
                    </div>
                    <div class="input-container">
                        <label for="animals">Cantidad de animales albergados</label>
                        <input type="number" id="animals" class="input" required min="0">
                    </div>
                    <div class="input-container">
                        <label for="donation-address">Dirección de donación</label>
                        <input type="text" id="donation-address" class="input" required>
                    </div>
                    <div class="input-container">
                        <label for="spaces">Cantidad de espacios para nuevos animales</label>
                        <input type="number" id="spaces" class="input" required min="0">
                    </div>
                    <div class="input-container">
                        <label for="donation-contact">Nombre de contacto de donaciones</label>
                        <input type="text" id="donation-contact" class="input" required>
                    </div>
                    <div class="input-container">
                        <label for="social-url">URL de Facebook/Instagram</label>
                        <input type="url" id="social-url" class="input" required>
                    </div>
                    <div class="input-container">
                        <label for="donation-phone">Número de contacto de donaciones</label>
                        <input type="tel" id="donation-phone" class="input" required>
                    </div>
                    <div class="input-container">
                        <label for="address">Dirección</label>
                        <input type="text" id="address" class="input" required>
                    </div>
                    <div class="input-container">
                        <label for="yape-plin">Número de Yape/Plin</label>
                        <input type="tel" id="yape-plin" class="input" required>
                    </div>
                    <div class="input-container">
                        <label for="district">Distrito</label>
                        <input type="text" id="district" class="input" required>
                    </div>
                    <div class="input-container">
                        <label for="qr-code" class="file-label">Adjunte Código QR</label>
                        <input type="file" id="qr-code" class="file-input" accept="image/*" required>
                    </div>
                </div>
                <div class="button-container">
                    <button type="submit" class="button registrarse">REGISTRARSE</button>
                </div>
            </form>
            <div class="social-icons">
                <div class="social-icon facebook"></div>
                <div class="social-icon instagram"></div>
                <div class="social-icon twitter"></div>
            </div>
        </div>
    </div>

    <script>
    function validateForm() {
        var inputs = document.getElementsByTagName('input');
        for (var i = 0; i < inputs.length; i++) {
            if (inputs[i].hasAttribute('required') && inputs[i].value === '') {
                alert('Por favor, complete todos los campos obligatorios.');
                return false;
            }
        }
        window.location.href = 'Albergue.html';
        return false; // Prevent form from submitting normally
    }
    </script>
</body>
</html>
